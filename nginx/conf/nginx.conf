worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream user_service_upstream {
        # 默认轮询（Round Robin）：按书写顺序轮流分发请求
        server user-service-1:8081;
        server user-service-2:8082;

        # 切换为权重算法示例（启用下面两行，并注释上面两行）
        # server user-service-1:8081 weight=3;
        # server user-service-2:8082 weight=1;

        # 切换为 IP 哈希示例（启用 ip_hash，并保持 server 列表）
        # ip_hash;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # 负载均衡转发动态接口
        location /api/ {
            proxy_pass http://user_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 动静分离：首页直接由 Nginx 返回
        location = / {
            try_files /index.html =404;
        }

        # 动静分离：静态资源请求直接映射到 html 目录
        location ~* \.(html|css|js)$ {
            try_files $uri =404;
            expires 1h;
            add_header Cache-Control "public";
        }

        # 其他静态路径兜底
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
