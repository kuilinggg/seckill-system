worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream user_service_upstream {
        server user-service-1:8081;
        server user-service-2:8082;
    }

    upstream product_service_upstream {
        server product-service-1:8085;
        server product-service-2:8086;
    }

    upstream order_service_upstream {
        server order-service-1:8087;
        server order-service-2:8089;
    }

    upstream inventory_service_upstream {
        server inventory-service-1:8088;
        server inventory-service-2:8090;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location /api/users/ {
            proxy_pass http://user_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/products/ {
            proxy_pass http://product_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/orders/ {
            proxy_pass http://order_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/inventory/ {
            proxy_pass http://inventory_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = / {
            try_files /index.html =404;
        }

        location ~* \.(html|css|js)$ {
            try_files $uri =404;
            expires 1h;
            add_header Cache-Control "public";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
