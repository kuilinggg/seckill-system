server:
  port: 8088

spring:
  application:
    name: inventory-service
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: ${INVENTORY_MASTER_DATASOURCE_URL:jdbc:mysql://localhost:13306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
          username: ${INVENTORY_MASTER_DATASOURCE_USERNAME:root}
          password: ${INVENTORY_MASTER_DATASOURCE_PASSWORD:root}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave_1:
          url: ${INVENTORY_SLAVE_DATASOURCE_URL:jdbc:mysql://localhost:3307/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
          username: ${INVENTORY_SLAVE_DATASOURCE_USERNAME:root}
          password: ${INVENTORY_SLAVE_DATASOURCE_PASSWORD:root}
          driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: inventory-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.baomidou.dynamic.datasource: DEBUG
