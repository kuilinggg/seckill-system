
services:
  mysql-master:
    image: bitnamilegacy/mysql:8.0
    container_name: mysql-master
    restart: unless-stopped
    environment:
      MYSQL_REPLICATION_MODE: master
      MYSQL_REPLICATION_USER: repl_user
      MYSQL_REPLICATION_PASSWORD: repl_pass
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - ./docker/mysql-master/data:/bitnami/mysql

  mysql-slave:
    image: bitnamilegacy/mysql:8.0
    container_name: mysql-slave
    restart: unless-stopped
    environment:
      MYSQL_REPLICATION_MODE: slave
      MYSQL_REPLICATION_USER: repl_user
      MYSQL_REPLICATION_PASSWORD: repl_pass
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_MASTER_PORT_NUMBER: 3306
      MYSQL_MASTER_ROOT_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql-slave/data:/bitnami/mysql
    depends_on:
      - mysql-master

  user-service-1:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service-1
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-master:3306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8081:8081"
    depends_on:
      - mysql-master

  user-service-2:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service-2
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-master:3306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8082:8082"
    depends_on:
      - mysql-master

  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - mysql-master
      - mysql-slave
      - user-service-1
      - user-service-2

  redis:
    image: redis:alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass "password123" # 设置一个密码

  elasticsearch:
    image: elasticsearch:7.17.10
    container_name: seckill-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

  kibana:
    image: kibana:7.17.10
    container_name: seckill-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"

  zookeeper:
    image: bitnamilegacy/zookeeper:3.8
    container_name: seckill-zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "12181:2181"

  kafka:
    image: bitnamilegacy/kafka:3.4
    container_name: seckill-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
