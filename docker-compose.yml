
services:
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

  user-service-1:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service-1
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - "8081:8081"
    depends_on:
      - mysql

  user-service-2:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service-2
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - "8082:8082"
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - mysql
      - user-service-1
      - user-service-2

  redis:
    image: redis:alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass "password123" # 设置一个密码
